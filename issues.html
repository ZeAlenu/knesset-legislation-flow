<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דיווח בעיות — ריבונות הכנסת</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f5f7fa;color:#333;direction:rtl}
.container{max-width:750px;margin:0 auto;padding:20px}
h1{text-align:center;color:#0A5E6E;margin-bottom:8px;font-size:22px}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.form-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.form-group{margin-bottom:16px}
label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:#555}
input[type="text"],textarea,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:14px;direction:rtl;transition:border-color .2s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#0A5E6E;box-shadow:0 0 0 3px rgba(10,94,110,.1)}
textarea{min-height:120px;resize:vertical}
.cat-select{display:flex;gap:8px;flex-wrap:wrap}
.cat-option{padding:6px 14px;border-radius:20px;border:2px solid #ddd;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.cat-option.selected{border-color:#0A5E6E;background:#E6F6FB}
.cat-option:hover{border-color:#0A5E6E}
.priority-row{display:flex;gap:8px}
.priority-btn{flex:1;padding:8px;border:2px solid #ddd;border-radius:8px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;background:#fff;font-family:inherit;transition:all .2s}
.priority-btn.selected{border-color:#0A5E6E;background:#E6F6FB}
.priority-btn:hover{border-color:#0A5E6E}
.submit-btn{width:100%;padding:12px;border:none;border-radius:10px;background:#0A5E6E;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.submit-btn:hover{background:#087080}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}
.send-report-btn{width:100%;padding:12px;border:2px solid #E67E22;border-radius:10px;background:#FEF3C7;color:#92400E;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:16px}
.send-report-btn:hover{background:#E67E22;color:#fff}
.send-report-btn:disabled{opacity:.5;cursor:not-allowed}
.success-msg{text-align:center;padding:16px;background:#d4edda;border-radius:10px;color:#155724;font-weight:600;display:none;margin-top:12px}
.issue-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-right:4px solid #0A5E6E}
.issue-card.status-open{border-right-color:#E67E22}
.issue-card.status-fixed{border-right-color:#2196F3}
.issue-card.status-verified{border-right-color:#28a745}
.issue-card.status-reopened{border-right-color:#CC0000}
.issue-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.issue-title{font-weight:700;font-size:14px}
.issue-meta{font-size:11px;color:#888}
.issue-desc{font-size:13px;color:#555;line-height:1.6}
.issue-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#555;font-weight:600}
.tag.cat-system{background:#E6F6FB;color:#0A5E6E}
.tag.cat-func{background:#FEF3C7;color:#92400E}
.tag.cat-design{background:#F3E8FF;color:#6B21A8}
.tag.cat-content{background:#DCFCE7;color:#166534}
.tag.p-high{background:#FEE2E2;color:#991B1B}
.tag.p-medium{background:#FEF3C7;color:#92400E}
.tag.p-low{background:#E0E7FF;color:#3730A3}
.tag.s-open{background:#FEF3C7;color:#92400E}
.tag.s-fixed{background:#DBEAFE;color:#1E40AF}
.tag.s-verified{background:#DCFCE7;color:#166534}
.tag.s-reopened{background:#FEE2E2;color:#991B1B}
.action-btn{font-size:11px;padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-family:inherit;transition:all .2s}
.action-btn:hover{background:#f0f0f0}
.action-btn.verify{border-color:#28a745;color:#28a745}
.action-btn.verify:hover{background:#28a745;color:#fff}
.action-btn.reopen{border-color:#CC0000;color:#CC0000}
.action-btn.reopen:hover{background:#CC0000;color:#fff}
.action-btn.delete{border-color:#999;color:#999}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #eee;padding-bottom:8px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:#888;border:none;background:transparent;font-family:inherit}
.tab.active{color:#0A5E6E;background:#E6F6FB;border-bottom:2px solid #0A5E6E}
.count-badge{background:#0A5E6E;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;margin-right:4px}
.id-bar{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.id-bar label{margin:0;white-space:nowrap}
.id-bar input{flex:1;margin:0}
.reporter-name{font-size:11px;color:#0A5E6E;font-weight:600}
.feedback-area{margin-top:8px;display:none}
.feedback-area textarea{min-height:60px;font-size:12px}
.feedback-area button{margin-top:4px}
.history-item{font-size:11px;color:#666;padding:4px 8px;background:#f8f9fa;border-radius:4px;margin-top:4px;border-right:3px solid #ddd}
.history-item.verified{border-right-color:#28a745}
.history-item.reopened{border-right-color:#CC0000}
</style>
</head>
<body>

<div class="container">
  <h1>📋 דיווח בעיות ובקשות</h1>
  <p class="subtitle">ריבונות הכנסת — מערכת הליך חקיקה פרטית</p>

  <div class="id-bar">
    <label>👤 שם:</label>
    <input type="text" id="reporterName" placeholder="השם שלך..." style="font-size:14px">
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('new',this)">➕ דיווח חדש</button>
    <button class="tab" onclick="showTab('open',this)">📋 ממתינות <span class="count-badge" id="openCount">0</span></button>
    <button class="tab" onclick="showTab('review',this)">🔍 לאימות <span class="count-badge" id="reviewCount">0</span></button>
    <button class="tab" onclick="showTab('done',this)">✅ הושלמו</button>
  </div>

  <!-- New Issue Form -->
  <div id="tab-new" class="form-card">
    <div class="form-group">
      <label>כותרת הבעיה / בקשה</label>
      <input type="text" id="issueTitle" placeholder="תיאור קצר...">
    </div>
    <div class="form-group">
      <label>פירוט</label>
      <textarea id="issueDesc" placeholder="תארי את הבעיה, מה ציפית שיקרה, מה קרה בפועל..."></textarea>
    </div>
    <div class="form-group">
      <label>קטגוריה</label>
      <div class="cat-select">
        <span class="cat-option selected" data-cat="func" onclick="selectCat(this)">🔧 פונקציונליות</span>
        <span class="cat-option" data-cat="design" onclick="selectCat(this)">🎨 עיצוב</span>
        <span class="cat-option" data-cat="content" onclick="selectCat(this)">📝 תוכן</span>
        <span class="cat-option" data-cat="system" onclick="selectCat(this)">🖥️ מערכת</span>
      </div>
    </div>
    <div class="form-group">
      <label>עדיפות</label>
      <div class="priority-row">
        <button class="priority-btn" data-p="high" onclick="selectPriority(this)">🔴 דחוף</button>
        <button class="priority-btn selected" data-p="medium" onclick="selectPriority(this)">🟡 רגיל</button>
        <button class="priority-btn" data-p="low" onclick="selectPriority(this)">🔵 נמוך</button>
      </div>
    </div>
    <button class="submit-btn" onclick="submitIssue()">💾 שמור דיווח</button>
    <div class="success-msg" id="successMsg">✅ הדיווח נשמר!</div>
  </div>

  <!-- Open (waiting for fix) -->
  <div id="tab-open" style="display:none"></div>

  <!-- Review (fixed, awaiting verification) -->
  <div id="tab-review" style="display:none"></div>

  <!-- Done (verified) -->
  <div id="tab-done" style="display:none"></div>

  <!-- Send Report -->
  <button class="send-report-btn" id="sendReportBtn" onclick="sendReport()">📤 שגר דוח לטיפול</button>
  <div class="success-msg" id="reportSentMsg">✅ הדוח נשלח לטיפול!</div>
</div>

<script>
const STORAGE_KEY = "knesset-issues-v1";
const REPORTER_KEY = "knesset-reporter-name";
const PUBLISH_BASE = document.location.origin;

/* Status flow:
   open → fixed (by admin) → verified (by reporter) = done
   open → fixed → reopened (by reporter, with feedback) → fixed → ...
*/

// Seed data — open tasks from TASK-TRACKER
const SEED_ISSUES = [
  {id:1772907001, title:"S08 — דומיין קבוע", desc:"URL שלא משתנה כל פעם שהשרת עולה — GitHub Pages או zan.org.il", cat:"system", priority:"medium", reporter:"אררט", status:"open", date:"7.3.2026", time:"12:15", history:[{action:"opened",by:"אררט",at:"2026-03-07T12:15:00Z"}]},
  {id:1772907002, title:"C03 — שליטה במסגרת שלבים", desc:"אפשרות לערוך border (צבע, עובי, סגנון) לשלבים בודדים", cat:"design", priority:"low", reporter:"נגה ארבל", status:"open", date:"6.3.2026", time:"18:30", history:[{action:"opened",by:"נגה ארבל",at:"2026-03-06T18:30:00Z"}]},
  {id:1772907003, title:"M02 — פיצול שלב למקביל — דורש אימות", desc:"כפילויות תוקנו חלקית (deep clone + dedup). צריך אימות שהבעיה לא חוזרת.", cat:"func", priority:"medium", reporter:"אררט", status:"fixed", date:"5.3.2026", time:"19:00", history:[{action:"opened",by:"אררט",at:"2026-03-05T19:00:00Z"},{action:"fixed",by:"אררט",at:"2026-03-07T12:00:00Z"}]},
  {id:1772907004, title:"T04 — הפניות לתקנון הכנסת (חלקי)", desc:"סעיפים 75-94 — דוגמה קיימת ב'ח\"כ יוזם' בלבד. שאר השלבים פתוחים.", cat:"content", priority:"high", reporter:"אררט", status:"open", date:"7.3.2026", time:"12:15", history:[{action:"opened",by:"אררט",at:"2026-03-07T12:15:00Z"}]},
  {id:1772907005, title:"T05 — הפניות inline לכל תת-סעיפי התקנון", desc:"כל קביעה + מגילה לתת-סעיף הספציפי בכל 10 השלבים", cat:"content", priority:"high", reporter:"אררט", status:"open", date:"7.3.2026", time:"12:58", history:[{action:"opened",by:"אררט",at:"2026-03-07T12:58:00Z"}]},
  {id:1772907006, title:"DT02 — תיקון גישה ל-Slack threads", desc:"אין גישה ל-threads בערוץ (שגיאת channel_not_found). דורש בדיקת OAuth scopes.", cat:"system", priority:"medium", reporter:"אררט", status:"open", date:"7.3.2026", time:"18:00", history:[{action:"opened",by:"אררט",at:"2026-03-07T18:00:00Z"}]}
];

document.addEventListener("DOMContentLoaded", function(){
  const saved = localStorage.getItem(REPORTER_KEY);
  if(saved) document.getElementById("reporterName").value = saved;
  // Seed if empty
  const existing = getIssues();
  if(existing.length === 0){
    saveIssues(SEED_ISSUES);
  }
  renderAll();
});
document.getElementById("reporterName").addEventListener("change", function(){
  localStorage.setItem(REPORTER_KEY, this.value.trim());
});

function getReporter(){
  const name = document.getElementById("reporterName").value.trim();
  if(!name){ alert("נא למלא שם"); document.getElementById("reporterName").focus(); return null; }
  localStorage.setItem(REPORTER_KEY, name);
  return name;
}

function getIssues(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch(e){ return []; } }
function saveIssues(issues){ localStorage.setItem(STORAGE_KEY, JSON.stringify(issues)); }
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function selectCat(el){ el.parentElement.querySelectorAll(".cat-option").forEach(e=>e.classList.remove("selected")); el.classList.add("selected"); }
function selectPriority(el){ el.parentElement.querySelectorAll(".priority-btn").forEach(e=>e.classList.remove("selected")); el.classList.add("selected"); }

function submitIssue(){
  const reporter = getReporter(); if(!reporter) return;
  const title = document.getElementById("issueTitle").value.trim();
  if(!title){ alert("נא למלא כותרת"); return; }
  const desc = document.getElementById("issueDesc").value.trim();
  const cat = document.querySelector(".cat-option.selected")?.dataset.cat || "func";
  const priority = document.querySelector(".priority-btn.selected")?.dataset.p || "medium";
  const issues = getIssues();
  issues.unshift({
    id: Date.now(), title, desc, cat, priority, reporter,
    status: "open", // open | fixed | verified | reopened
    date: new Date().toLocaleDateString("he-IL"),
    time: new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}),
    history: [{action:"opened", by:reporter, at:new Date().toISOString()}]
  });
  saveIssues(issues);
  document.getElementById("issueTitle").value = "";
  document.getElementById("issueDesc").value = "";
  const msg = document.getElementById("successMsg");
  msg.style.display = "block";
  setTimeout(()=>{ msg.style.display="none"; }, 3000);
  renderAll();
}

const catLabels = {func:"🔧 פונקציונליות",design:"🎨 עיצוב",content:"📝 תוכן",system:"🖥️ מערכת"};
const pLabels = {high:"🔴 דחוף",medium:"🟡 רגיל",low:"🔵 נמוך"};
const sLabels = {open:"⏳ ממתין",fixed:"🔧 טופל — ממתין לאימות",verified:"✅ אומת",reopened:"🔄 נפתח מחדש"};

function renderCard(issue){
  const hist = (issue.history||[]).map(h=>{
    const cls = h.action==="verified"?"verified":h.action==="reopened"?"reopened":"";
    const icons = {opened:"📝",fixed:"🔧",verified:"✅",reopened:"🔄"};
    const d = new Date(h.at);
    const dateStr = d.toLocaleDateString("he-IL") + " " + d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
    return `<div class="history-item ${cls}">${icons[h.action]||"📌"} ${esc(h.by)} — ${dateStr}${h.note?' — '+esc(h.note):''}</div>`;
  }).join("");

  let actions = '';
  if(issue.status === "open" || issue.status === "reopened"){
    actions = `<button class="action-btn delete" onclick="deleteIssue(${issue.id})">🗑️ מחק</button>`;
  } else if(issue.status === "fixed"){
    actions = `
      <button class="action-btn verify" onclick="verifyIssue(${issue.id})">✅ אושר — הבעיה תוקנה</button>
      <button class="action-btn reopen" onclick="toggleFeedback(${issue.id})">❌ הבעיה נמשכת</button>
      <div class="feedback-area" id="feedback-${issue.id}">
        <textarea id="feedbackText-${issue.id}" placeholder="מה עדיין לא עובד?"></textarea>
        <button class="action-btn reopen" onclick="reopenIssue(${issue.id})">📤 שלח ופתח מחדש</button>
      </div>`;
  } else if(issue.status === "verified"){
    actions = `<span style="color:#28a745;font-weight:600;font-size:12px">✅ אומת ונסגר</span>`;
  }

  return `<div class="issue-card status-${issue.status}">
    <div class="issue-header">
      <span class="issue-title">${esc(issue.title)}</span>
      <span class="issue-meta">👤 ${esc(issue.reporter)} · ${issue.date} ${issue.time}</span>
    </div>
    ${issue.desc?`<div class="issue-desc">${esc(issue.desc).replace(/\n/g,'<br>')}</div>`:''}
    <div class="issue-tags">
      <span class="tag cat-${issue.cat}">${catLabels[issue.cat]||issue.cat}</span>
      <span class="tag p-${issue.priority}">${pLabels[issue.priority]||issue.priority}</span>
      <span class="tag s-${issue.status}">${sLabels[issue.status]||issue.status}</span>
    </div>
    ${hist?'<div style="margin-top:8px">'+hist+'</div>':''}
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">${actions}</div>
  </div>`;
}

function renderAll(){
  const issues = getIssues();
  const open = issues.filter(i=>i.status==="open"||i.status==="reopened");
  const review = issues.filter(i=>i.status==="fixed");
  const done = issues.filter(i=>i.status==="verified");

  document.getElementById("tab-open").innerHTML = open.length ? open.map(renderCard).join("") : '<p style="text-align:center;color:#888;padding:20px">🎉 אין בעיות ממתינות</p>';
  document.getElementById("tab-review").innerHTML = review.length ? '<p style="color:#1E40AF;font-size:13px;font-weight:600;margin-bottom:12px;padding:0 4px">הבעיות הבאות סומנו כ"טופל". בדקי ואשרי או דווחי שהבעיה נמשכת:</p>' + review.map(renderCard).join("") : '<p style="text-align:center;color:#888;padding:20px">אין בעיות לאימות</p>';
  document.getElementById("tab-done").innerHTML = done.length ? done.map(renderCard).join("") : '<p style="text-align:center;color:#888;padding:20px">אין בעיות שאומתו</p>';

  document.getElementById("openCount").textContent = open.length;
  document.getElementById("reviewCount").textContent = review.length;
  document.getElementById("sendReportBtn").disabled = (open.length + review.length) === 0;
}

function verifyIssue(id){
  const reporter = getReporter(); if(!reporter) return;
  const issues = getIssues();
  const issue = issues.find(i=>i.id===id);
  if(!issue) return;
  issue.status = "verified";
  if(!issue.history) issue.history = [];
  issue.history.push({action:"verified", by:reporter, at:new Date().toISOString()});
  saveIssues(issues);
  renderAll();
}

function toggleFeedback(id){
  const el = document.getElementById("feedback-"+id);
  el.style.display = el.style.display==="none"||!el.style.display ? "block" : "none";
}

function reopenIssue(id){
  const reporter = getReporter(); if(!reporter) return;
  const issues = getIssues();
  const issue = issues.find(i=>i.id===id);
  if(!issue) return;
  const note = document.getElementById("feedbackText-"+id)?.value.trim() || "";
  issue.status = "reopened";
  if(!issue.history) issue.history = [];
  issue.history.push({action:"reopened", by:reporter, at:new Date().toISOString(), note});
  saveIssues(issues);
  renderAll();
}

function deleteIssue(id){
  if(!confirm("למחוק?")) return;
  saveIssues(getIssues().filter(i=>i.id!==id));
  renderAll();
}

async function sendReport(){
  const reporter = getReporter(); if(!reporter) return;
  const issues = getIssues();
  const active = issues.filter(i=>i.status!=="verified");
  if(active.length===0){ alert("אין בעיות פעילות"); return; }

  const btn = document.getElementById("sendReportBtn");
  btn.disabled = true; btn.textContent = "📤 שולח...";

  try {
    const resp = await fetch(PUBLISH_BASE + "/report", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        reporter, sentAt: new Date().toISOString(),
        issues: active,
        summary: {
          open: issues.filter(i=>i.status==="open").length,
          reopened: issues.filter(i=>i.status==="reopened").length,
          fixed: issues.filter(i=>i.status==="fixed").length,
          verified: issues.filter(i=>i.status==="verified").length
        }
      })
    });
    const result = await resp.json();
    if(result.ok){
      const msg = document.getElementById("reportSentMsg");
      msg.style.display = "block";
      setTimeout(()=>{ msg.style.display="none"; }, 5000);
    } else { alert("שגיאה: " + (result.error||"")); }
  } catch(e){ alert("שגיאה: " + e.message); }
  btn.disabled = false; btn.textContent = "📤 שגר דוח לטיפול";
}

function showTab(name, tabEl){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("[id^=tab-]").forEach(el=>el.style.display="none");
  if(tabEl) tabEl.classList.add("active");
  document.getElementById("tab-"+name).style.display = "block";
}
</script>
</body>
</html>
