<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הליך חקיקה פרטית — ריבונות הכנסת</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --teal-dark:#0A5E6E;--teal-mid:#1A7A9A;--teal-light:#2E96B8;--teal-pale:#4DB8D9;
  --chk:#2E86AB;--nesiut:#8B5CF6;--mazkir:#5B7B9A;--yoresh:#1B3A6B;--vaadat:#2D7D46;
  --gov:#C03928;--chriga:#CC0000;--process:#0A5E6E;--waiting:#B8860B;
  --bg:#f5f7fa;--card:#fff;--text:#333;--text-light:#666;
  --depth0:#0A5E6E;--depth1:#1A7A9A;--depth2:#2E96B8;--depth3:#4DB8D9;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;font-size:14px}

/* HEADER */
header{background:linear-gradient(135deg,#0A5E6E 0%,#1A7A9A 100%);color:#fff;padding:18px 40px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 12px rgba(0,0,0,.15);position:relative;z-index:100}
header h1{font-size:26px;font-weight:800}
header p{font-size:13px;opacity:.85}
.header-actions{margin-right:auto;display:flex;gap:8px}
.header-actions button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px}
.header-actions button:hover{background:rgba(255,255,255,.3)}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 40px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar button{background:#f0f0f0;border:1px solid #ddd;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .2s}
.toolbar button:hover{background:#e0e0e0}
.toolbar .sep{width:1px;height:24px;background:#ddd;margin:0 4px}

/* LAYOUT */
.container{display:flex;gap:30px;padding:24px 40px;max-width:1900px;margin:0 auto}
.hierarchy-panel{flex:1;min-width:0}
.flow-panel{width:500px;flex-shrink:0;position:sticky;top:20px;align-self:flex-start}

/* LEGEND */
.legend{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.legend-title{font-weight:700;font-size:12px;color:#666;margin-left:12px}
.legend-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#555}
.legend-swatch{width:16px;height:16px;border-radius:3px;display:inline-block;flex-shrink:0}

/* STAGE BUTTON */
.stage-btn{background:#fff;border:3px solid var(--teal-dark);border-radius:12px;padding:14px 20px;cursor:pointer;transition:all .2s;margin-bottom:8px;display:flex;align-items:center;gap:12px;width:100%;font-family:inherit;text-align:right;position:relative}
.stage-btn:hover{background:#f0fafb;transform:translateX(-2px)}
.stage-btn.active{background:#e6f7f9;border-color:var(--teal-dark)}
.stage-btn .number{background:var(--teal-dark);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.stage-btn .label{font-size:17px;font-weight:700;color:var(--teal-dark)}
.stage-btn .arrow{margin-right:auto;font-size:18px;transition:transform .3s;color:var(--teal-dark)}
.stage-btn.active .arrow{transform:rotate(90deg)}
.stage-btn .edit-actions{display:none;gap:4px;margin-right:8px}
.editing .stage-btn .edit-actions{display:flex}
.edit-btn-sm{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;transition:background .2s}
.edit-btn-sm:hover{background:rgba(0,0,0,.1)}

/* STAGE CONTENT */
.stage-content{max-height:0;overflow:hidden;transition:max-height .4s ease;margin-bottom:6px;margin-right:18px;border-right:3px solid var(--teal-dark);padding-right:18px}
.stage-content.open{max-height:none;overflow:visible}

/* SUB-STEP */
.sub-step{margin-bottom:8px;border-radius:10px;overflow:visible;transition:all .2s;position:relative}
.sub-step-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:10px;transition:all .2s;border:2px solid transparent;position:relative;min-height:42px}
.sub-step-header:hover{filter:brightness(.95)}
.sub-step-header .icon{font-size:16px;flex-shrink:0}
.sub-step-header .text{font-size:14px;font-weight:600;flex:1}
.sub-step-header .expand-arrow{font-size:13px;transition:transform .3s;opacity:.6}
.sub-step.open>.sub-step-header .expand-arrow{transform:rotate(90deg)}
.sub-step-header .cat-logo{width:20px;height:20px;border-radius:3px;object-fit:contain;flex-shrink:0}
.sub-step-header .override-badge{font-size:10px;opacity:.7;cursor:help}
.sub-step-header .step-edit-actions{display:none;gap:3px;margin-right:4px}
.editing .sub-step-header .step-edit-actions{display:flex}

/* Depth border colors */
.depth-0>.sub-step-header{border-color:var(--depth0)}
.depth-1>.sub-step-header{border-color:var(--depth1)}
.depth-2>.sub-step-header{border-color:var(--depth2)}
.depth-3>.sub-step-header{border-color:var(--depth3)}

/* DETAIL PANEL */
.detail-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.detail-panel.open{max-height:none;overflow:visible}
.detail-content{padding:12px 16px;margin:4px 8px 8px;border-radius:8px;font-size:13px;line-height:1.7}
.detail-expand .detail-content{background:#E6F6FB;border:2px solid var(--teal-pale);color:#333}
.detail-chriga .detail-content{background:#3A0A0A;border:3px solid #CC0000;color:#fff}
.detail-chriga .stop-icon{font-size:18px;margin-left:6px}
.detail-chriga .reality{color:#FF6B6B;font-weight:700}

/* EDITABLE */
[contenteditable=true]{outline:2px dashed #2E86AB;outline-offset:2px;border-radius:4px;min-width:40px}
[contenteditable=true]:focus{outline-color:#0A5E6E;background:rgba(46,134,171,.05)}
.inline-edit-hint{display:none}
.editing .inline-edit-hint{display:inline;font-size:10px;color:#999;margin-right:6px}

/* FLOW CHART */
.flow-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.08);max-height:calc(100vh - 80px);overflow-y:auto;scroll-behavior:smooth}
.flow-card h3{font-size:15px;font-weight:700;color:#1B2A4A;margin-bottom:10px;text-align:center}

/* Shape legend */
.flow-legend{display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;margin-bottom:14px;padding:8px 10px;background:#f8f9fb;border-radius:8px;border:1px solid #e8e8e8}
.flow-legend-item{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#555;font-weight:500}
.flow-legend-shape{width:18px;height:14px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}

.flow-step{text-align:center;margin-bottom:2px;position:relative}
.flow-step .box{display:inline-block;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;color:#fff;min-width:160px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.flow-step .box:hover{transform:scale(1.03);filter:brightness(1.1)}
.flow-step .box.flow-active{border-color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,.6);animation:flowGlow 1.5s ease-in-out infinite alternate}
@keyframes flowGlow{from{box-shadow:0 0 8px rgba(255,215,0,.4)}to{box-shadow:0 0 16px rgba(255,215,0,.8)}}
.flow-here-badge{position:absolute;left:-2px;top:50%;transform:translateY(-50%);font-size:10px;color:#FFD700;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:0 0 4px rgba(0,0,0,.3)}
.flow-arrow{text-align:center;color:#bbb;font-size:16px;margin:2px 0;line-height:1}
.flow-note{font-size:10px;color:var(--waiting);text-align:center;margin:2px 0;font-weight:600}
.flow-split{display:flex;gap:8px;justify-content:center;margin:4px 0;align-items:flex-start}
.flow-track{display:flex;flex-direction:column;align-items:center;gap:3px}
.flow-or{background:var(--waiting);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.flow-side-note{font-size:10px;color:#CC0000;text-align:center;background:#FFF0F0;border:1px solid #CC0000;border-radius:6px;padding:2px 6px;margin:2px 0}
.flow-diamond{display:inline-flex;align-items:center;justify-content:center;width:85px;height:85px;transform:rotate(45deg);font-size:10px;font-weight:600;color:#fff;margin:6px auto;cursor:pointer;transition:all .2s;border:2px solid transparent}
.flow-diamond:hover{filter:brightness(1.1)}
.flow-diamond.flow-active{border-color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,.6)}
.flow-diamond span{transform:rotate(-45deg);display:block;text-align:center;line-height:1.3}
.flow-circle{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;border:2px solid transparent}
.flow-circle:hover{filter:brightness(1.1)}
.flow-circle.flow-active{border-color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,.6)}
.flow-converge-line{width:2px;height:12px;background:#bbb;margin:0 auto}
.flow-branch-container{display:flex;justify-content:center;gap:0;margin:4px 0;position:relative}
.flow-branch{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;position:relative}
.flow-branch-label{font-size:10px;color:#888;font-weight:600;margin-bottom:2px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:700px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);direction:rtl}
.modal h2{font-size:20px;margin-bottom:16px;color:var(--teal-dark);display:flex;align-items:center;gap:8px}
.modal-close{margin-right:auto;background:none;border:none;font-size:22px;cursor:pointer;color:#999}
.modal-close:hover{color:#333}

/* CATEGORY MANAGER */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.cat-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f8f9fa;border-radius:10px;border:1px solid #e8e8e8;transition:all .2s}
.cat-row:hover{border-color:#ccc}
.cat-row .cat-swatch{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid rgba(0,0,0,.1);flex-shrink:0}
.cat-row .cat-name{font-weight:600;font-size:14px;flex:1;min-width:60px}
.cat-row .cat-name input{font-family:inherit;font-size:14px;font-weight:600;border:none;background:transparent;width:100%;direction:rtl}
.cat-row .cat-name input:focus{outline:none;background:#fff;border-radius:4px;padding:2px 4px}
.cat-shape-sel{font-size:11px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;font-family:inherit;cursor:pointer}
.cat-logo-preview{width:24px;height:24px;border-radius:3px;object-fit:contain;border:1px solid #ddd}
.cat-logo-btn{font-size:11px;padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-family:inherit}
.cat-delete{background:none;border:none;cursor:pointer;font-size:16px;color:#ccc;padding:4px}
.cat-delete:hover{color:#CC0000}
.cat-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:2px dashed #ccc;border-radius:10px;cursor:pointer;color:#999;font-weight:600;font-size:13px;transition:all .2s;background:none;width:100%;font-family:inherit}
.cat-add-btn:hover{border-color:var(--teal-mid);color:var(--teal-mid)}

/* CATEGORY ASSIGN DROPDOWN */
.cat-assign{position:absolute;top:100%;right:0;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:50;min-width:200px;padding:6px;display:none}
.cat-assign.show{display:block}
.cat-assign-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s}
.cat-assign-item:hover{background:#f0f0f0}
.cat-assign-item .swatch{width:18px;height:18px;border-radius:3px;flex-shrink:0}
.cat-assign-item.active{background:#e6f7f9;font-weight:700}
.cat-assign-item.reset{color:#CC0000;font-weight:600;border-top:1px solid #eee;margin-top:4px;padding-top:10px}

/* COLOR PICKER POPUP */
.color-picker-popup{position:absolute;z-index:200;background:#fff;border-radius:12px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none}
.color-picker-popup.show{display:block}
.color-picker-popup input[type=color]{width:50px;height:36px;border:none;cursor:pointer;border-radius:4px}
.color-picker-popup .preset-colors{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.color-picker-popup .preset-color{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.color-picker-popup .preset-color:hover{border-color:#333}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* RESPONSIVE */
@media(max-width:1200px){.container{flex-direction:column;padding:16px}.flow-panel{width:100%;position:static}}
@media(max-width:600px){header{padding:14px 16px}header h1{font-size:20px}.container{padding:12px}.toolbar{padding:8px 16px}}

/* ADD STEP BUTTON */
.add-step-btn{display:none;border:2px dashed #ccc;border-radius:8px;padding:8px;text-align:center;color:#999;cursor:pointer;margin:6px 0;font-size:12px;font-weight:600;transition:all .2s;background:none;width:100%;font-family:inherit}
.add-step-btn:hover{border-color:var(--teal-mid);color:var(--teal-mid)}
.editing .add-step-btn{display:block}

/* FILE INPUT HIDDEN */
.hidden-input{position:absolute;width:0;height:0;opacity:0;pointer-events:none}

/* FLOW EDIT CONTROLS */
.flow-edit-actions{display:none;gap:3px;justify-content:center;margin:2px 0}
.editing .flow-edit-actions{display:flex}
.flow-edit-btn{background:rgba(255,255,255,.85);border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:11px;padding:1px 4px;transition:all .2s;line-height:1.2}
.flow-edit-btn:hover{background:#fff;border-color:#999}
.flow-insert-btn{display:none;border:2px dashed #ccc;border-radius:6px;padding:3px 10px;text-align:center;color:#999;cursor:pointer;margin:2px auto;font-size:11px;font-weight:600;transition:all .2s;background:none;font-family:inherit}
.flow-insert-btn:hover{border-color:var(--teal-mid);color:var(--teal-mid)}
.editing .flow-insert-btn{display:block}
.flow-shape-sel{font-size:10px;padding:2px 4px;border:1px solid #ccc;border-radius:4px;background:#fff;font-family:inherit;cursor:pointer;display:none}
.editing .flow-shape-sel{display:inline-block}
.flow-branch-edit{display:none;gap:4px;justify-content:center;margin:3px 0}
.editing .flow-branch-edit{display:flex}

/* Print */
@media print{.toolbar,.header-actions,.edit-actions,.step-edit-actions,.add-step-btn,.flow-panel,.flow-edit-actions,.flow-insert-btn,.flow-shape-sel,.flow-branch-edit{display:none!important}.stage-content{max-height:none!important;overflow:visible!important}.detail-panel{max-height:none!important;overflow:visible!important}}
</style>
</head>
<body>

<header>
  <div>
    <h1>הליך חקיקה פרטית</h1>
    <p>מיפוי סמכויות, חריגות מתקנון, והפקעת ריבונות הכנסת</p>
  </div>
  <div class="header-actions">
    <button onclick="toggleEditing()" id="editToggle">✏️ עריכה</button>
    <button onclick="openCatModal()">⚙️ קטגוריות</button>
    <button onclick="saveToStorage()">💾 שמור</button>
    <button onclick="exportJSON()">📤 ייצוא</button>
    <button onclick="document.getElementById('importInput').click()">📥 ייבוא</button>
    <input type="file" id="importInput" accept=".json" class="hidden-input" onchange="importJSON(event)">
  </div>
</header>

<div class="toolbar" id="toolbar" style="display:none">
  <span style="font-size:12px;color:#666;font-weight:600">מצב עריכה:</span>
  <button onclick="addStage()">➕ הוסף שלב</button>
  <div class="sep"></div>
  <button onclick="flowAddSplitAtEnd()">🔀 הוסף פיצול לתרשים</button>
  <div class="sep"></div>
  <span style="font-size:11px;color:#999">לחיצה כפולה על טקסט = עריכה | ➕ בתרשים = הוספת שלב</span>
</div>

<div style="padding:16px 40px 0;max-width:1900px;margin:0 auto">
  <div class="legend" id="legendBar"></div>
</div>

<div class="container">
  <div class="hierarchy-panel" id="hierarchyPanel"></div>
  <div class="flow-panel" id="flowPanel"></div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h2>⚙️ ניהול קטגוריות <button class="modal-close" onclick="closeCatModal()">✕</button></h2>
    <p style="font-size:12px;color:#888;margin-bottom:14px">שינוי צבע/צורה כאן → עדכון אוטומטי בכל הקופסאות המשויכות</p>
    <div class="cat-list" id="catList"></div>
    <button class="cat-add-btn" onclick="addCategory()">➕ הוסף קטגוריה</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUT FOR LOGO -->
<input type="file" id="logoInput" accept="image/*" class="hidden-input">

<script>
// ============================================================
// DATA MODEL
// ============================================================

const DEFAULT_CATEGORIES = [

  {id:"vaadat",name:"ועדת הכנסת",color:"#2D7D46",shape:"rounded-rect",logo:null},

          {id:"s1_1_2",title:"מה: איך כותבים הצעת חוק?",icon:"",catId:"process",chpiqa:false,depth:1,

                details:"המלצות ניסוח: לינק לקובץ של יועמ\"ש 02/2018\nהמלצות כתיבה — מרכז יכין",detailType:"expand",children:[]},

let appState = {
  categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
  stages: JSON.parse(JSON.stringify(DEFAULT_STAGES)),
  flowSteps: JSON.parse(JSON.stringify(DEFAULT_FLOW_STEPS)),
  editing: false,
  openStages: new Set(["s1"]),
  activeFlowStage: null  // tracks which stage is highlighted in flow
};

let nextId = 1000;
function genId(){ return "gen_" + (nextId++); }

// Dynamic mapping: flow step id → stage id (built from flowSteps data)
function buildFlowStageMaps(){
  const flowToStage = {};
  const stageToFlow = {};
  function scanSteps(steps){
    for(const step of steps){
      if(step.stageId){
        flowToStage[step.id] = step.stageId;
        if(!stageToFlow[step.stageId]) stageToFlow[step.stageId] = step.id;
      }
      if(step.branches){
        for(const b of step.branches){
          if(b.steps) scanSteps(b.steps);
        }
      }
    }
  }
  scanSteps(appState.flowSteps);
  return {flowToStage, stageToFlow};
}

function getFlowStageMap(){ return buildFlowStageMaps().flowToStage; }
function getStageFlowMap(){ return buildFlowStageMaps().stageToFlow; }

function loadFromStorage(){
  try {
    const raw = localStorage.getItem("knesset-legislation-v2");
    if(raw){
      const d = JSON.parse(raw);
      if(d.categories) appState.categories = d.categories;
      if(d.stages) appState.stages = d.stages;
      if(d.flowSteps) appState.flowSteps = d.flowSteps;
      if(d.nextId) nextId = d.nextId;
      showToast("נטען מאחסון מקומי");
    }
  } catch(e){ console.error("Load error:",e); }
}

function saveToStorage(){
  try {
    localStorage.setItem("knesset-legislation-v2", JSON.stringify({
      categories: appState.categories,
      stages: appState.stages,
      flowSteps: appState.flowSteps,
      nextId
    }));
    showToast("💾 נשמר בהצלחה");
  } catch(e){ showToast("❌ שגיאה בשמירה"); }
}

function exportJSON(){
  const blob = new Blob([JSON.stringify({categories:appState.categories,stages:appState.stages,flowSteps:appState.flowSteps,nextId,exportDate:new Date().toISOString()},null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "knesset-legislation-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  showToast("📤 קובץ JSON יוצא");
}

function importJSON(ev){
  const f = ev.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = function(e){
    try {
      const d = JSON.parse(e.target.result);
      if(d.categories) appState.categories = d.categories;
      if(d.stages) appState.stages = d.stages;
      if(d.flowSteps) appState.flowSteps = d.flowSteps;
      if(d.nextId) nextId = d.nextId;
      renderAll();
      showToast("📥 יובא בהצלחה");
    } catch(err){ showToast("❌ קובץ לא תקין"); }
  };
  r.readAsText(f);
  ev.target.value = "";
}

      <button class="cat-logo-btn" onclick="uploadCatLogo('${cat.id}')">🖼️</button>

function pickCatColor(catId, swatchEl){
  document.querySelectorAll(".color-picker-popup").forEach(p=>p.remove());
  const cat = getCat(catId);
  const popup = document.createElement("div");
  popup.className = "color-picker-popup show";
  popup.innerHTML = `
    <input type="color" value="${cat.color}" oninput="updateCatColorLive('${catId}',this.value,this.closest('.cat-row'))">
    <div class="preset-colors">
      ${["#2E86AB","#8B5CF6","#5B7B9A","#1B3A6B","#2D7D46","#C03928","#CC0000","#0A5E6E","#B8860B","#E67E22","#8E44AD","#2C3E50"].map(c=>
        `<div class="preset-color" style="background:${c}" onclick="updateCatColorLive('${catId}','${c}',this.closest('.cat-row'));this.closest('.color-picker-popup').querySelector('input').value='${c}'"></div>`
      ).join("")}
    </div>
  `;
  popup.style.position = "absolute";
  popup.style.zIndex = "300";
  swatchEl.parentElement.style.position = "relative";
  swatchEl.parentElement.appendChild(popup);
  setTimeout(()=>{
    document.addEventListener("click",function handler(e){
      if(!popup.contains(e.target) && e.target !== swatchEl){
        popup.remove();
        document.removeEventListener("click",handler);
      }
    });
  },50);
}

function updateCatColorLive(catId, color, rowEl){
  const cat = getCat(catId);
  if(cat){ cat.color = color; }
  if(rowEl){
    const swatch = rowEl.querySelector(".cat-swatch");
    if(swatch) swatch.style.background = color;
  }
}

function updateCatName(catId, name){
  const cat = getCat(catId);
  if(cat) cat.name = name;
}

function updateCatShape(catId, shape){
  const cat = getCat(catId);
  if(cat) cat.shape = shape;
}

function uploadCatLogo(catId){
  const inp = document.getElementById("logoInput");
  inp.onchange = function(e){
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = function(ev){
      const cat = getCat(catId);
      if(cat){ cat.logo = ev.target.result; }
      renderCatList();
    };
    r.readAsDataURL(f);
    inp.value = "";
  };
  inp.click();
}

function deleteCat(catId){
  if(!confirm("למחוק את הקטגוריה?")) return;
  appState.categories = appState.categories.filter(c=>c.id !== catId);
  function resetCat(steps){
    steps.forEach(s => {
      if(s.catId === catId) s.catId = "process";
      if(s.children) resetCat(s.children);
    });
  }
  appState.stages.forEach(st => resetCat(st.steps));
  renderCatList();
}

function addCategory(){
  const id = "cat_" + genId();
  appState.categories.push({id, name:"קטגוריה חדשה", color:"#607D8B", shape:"rounded-rect", logo:null});
  renderCatList();
}

function toggleEditing(){
  appState.editing = !appState.editing;
  document.body.classList.toggle("editing", appState.editing);
  document.getElementById("toolbar").style.display = appState.editing ? "flex" : "none";
  document.getElementById("editToggle").innerHTML = appState.editing ? "✅ סיים עריכה" : "✏️ עריכה";
  renderAll();
}

function makeEditable(text, onUpdate){
  const span = document.createElement("span");
  span.textContent = text;
  span.addEventListener("dblclick", function(e){
    if(!appState.editing) return;
    e.stopPropagation();
    span.contentEditable = "true";
    span.focus();
    const range = document.createRange();
    range.selectNodeContents(span);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
  span.addEventListener("blur", function(){
    span.contentEditable = "false";
    onUpdate(span.textContent);
  });
  span.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      span.blur();
    }
  });
  return span;
}

const HEBREW_LETTER_NAMES = {
  "א":"א'","ב":"ב'","ג":"ג'","ד":"ד'","ה":"ה'","ו":"ו'","ז":"ז'","ח":"ח'","ט":"ט'","י":"י'"
};

function renderHierarchy(){
  const panel = document.getElementById("hierarchyPanel");
  panel.innerHTML = "";

  appState.stages.forEach((stage, si) => {
    const isOpen = appState.openStages.has(stage.id);
    const letterLabel = HEBREW_LETTER_NAMES[stage.letter] || stage.letter;

    // Stage button
    const btn = document.createElement("button");
    btn.className = "stage-btn" + (isOpen ? " active" : "");
    btn.id = "stage-btn-" + stage.id;
    btn.innerHTML = `
      <span class="number">${escH(stage.letter)}</span>
      <span class="label">שלב ${letterLabel}: ${escH(stage.title)}</span>
      ${stage.subtitle ? `<span style="font-size:12px;color:#666;font-weight:400"> — ${escH(stage.subtitle)}</span>` : ""}
      <span class="edit-actions">
        <span class="edit-btn-sm" onclick="event.stopPropagation();editStageName('${stage.id}')" title="ערוך שם">✏️</span>
        <span class="edit-btn-sm" onclick="event.stopPropagation();deleteStage('${stage.id}')" title="מחק שלב">🗑️</span>
      </span>
      <span class="arrow">◀</span>
    `;
    let stageClickTimer = null;
    btn.addEventListener("click", function(e){
      if(e.target.closest(".edit-actions")) return;
      if(stageClickTimer) return;
      stageClickTimer = setTimeout(function(){
        stageClickTimer = null;
        if(isOpen) appState.openStages.delete(stage.id);
        else appState.openStages.add(stage.id);
        // Update active flow stage
        if(appState.openStages.has(stage.id)){
          appState.activeFlowStage = stage.id;
        } else if(appState.activeFlowStage === stage.id){
          // Find next open stage
          appState.activeFlowStage = null;
          for(const s of appState.stages){
            if(appState.openStages.has(s.id)){
              appState.activeFlowStage = s.id;
              break;
            }
          }
        }
        renderAll();
        // Auto-scroll flow chart to highlighted step
        highlightFlowStep();
      }, 200);
    });
    // Double-click label to edit
    btn.addEventListener("dblclick", function(e){
      if(stageClickTimer){ clearTimeout(stageClickTimer); stageClickTimer = null; }
      if(!appState.editing) return;
      e.stopPropagation();
      const lbl = btn.querySelector(".label");
      lbl.contentEditable = "true";
      lbl.focus();
      const range = document.createRange();
      range.selectNodeContents(lbl);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      lbl.addEventListener("blur", function(){
        lbl.contentEditable = "false";
        stage.title = lbl.textContent.replace(/^שלב [א-ת]':\s*/, '');
      },{once:true});
      lbl.addEventListener("keydown", function(ev){
        if(ev.key === "Enter" && !ev.shiftKey){ ev.preventDefault(); lbl.blur(); }
      });
    });
    panel.appendChild(btn);

    // Stage content
    const content = document.createElement("div");
    content.className = "stage-content" + (isOpen ? " open" : "");

    if(isOpen){
      stage.steps.forEach((step, stepi) => {
        content.appendChild(renderStep(step, stage, stepi));
      });
      const addBtn = document.createElement("button");
      addBtn.className = "add-step-btn";
      addBtn.textContent = "➕ הוסף תת-שלב";
      addBtn.onclick = function(){ addStepTo(stage.steps, stage); };
      content.appendChild(addBtn);
    }

    panel.appendChild(content);
  });
}

function renderStep(step, stage, index){
  const cat = getCat(step.catId) || getCat("process");
  const overrideColor = step.overrideColor;
  const overrideBorder = step.overrideBorder;
  const bgColor = overrideColor || cat.color;
  const borderColor = overrideBorder || getDepthColor(step.depth);
  const isChriga = step.chpiqa;
  const hasChildren = (step.children && step.children.length > 0) || step.details;

  const wrapper = document.createElement("div");
  wrapper.className = `sub-step depth-${step.depth}${step._open ? " open" : ""}`;
  if(isChriga && !step.details) wrapper.classList.add("chriga-full");
  else if(isChriga) wrapper.classList.add("chriga");
  wrapper.style.position = "relative";

  const header = document.createElement("div");
  header.className = "sub-step-header";
  header.style.background = isChriga && !step.detailType ? "#CC0000" : (isLightStep(step) ? lighten(bgColor, 0.85) : bgColor);
  header.style.color = isChriga && !step.detailType ? "#fff" : (isLightStep(step) ? darken(bgColor) : "#fff");
  header.style.borderColor = isChriga ? "#CC0000" : borderColor;

  let headerHTML = "";
  if(cat.logo) headerHTML += `<img class="cat-logo" src="${cat.logo}" style="width:18px;height:18px;border-radius:2px;flex-shrink:0">`;
  if(step.icon) headerHTML += `<span class="icon">${step.icon}</span>`;
  headerHTML += `<span class="text">${escH(step.title)}</span>`;
  if(overrideColor || overrideBorder) headerHTML += `<span class="override-badge" title="עקיפת קטגוריה">🎨</span>`;
  headerHTML += `
    <span class="step-edit-actions">
      <span class="edit-btn-sm" onclick="event.stopPropagation();editStepTitle('${step.id}',this)" title="ערוך שם">✏️</span>
      <span class="edit-btn-sm" onclick="event.stopPropagation();showCatAssign(event,'${step.id}')" title="שייך קטגוריה">🏷️</span>
      <span class="edit-btn-sm" onclick="event.stopPropagation();pickStepColor(event,'${step.id}')" title="צבע">🎨</span>
      <span class="edit-btn-sm" onclick="event.stopPropagation();toggleChpiqa('${step.id}')" title="חריגה">${isChriga?"✅":"🛑"}</span>
      <span class="edit-btn-sm" onclick="event.stopPropagation();deleteStep('${step.id}')" title="מחק">🗑️</span>
    </span>
  `;
  if(hasChildren) headerHTML += `<span class="expand-arrow">◀</span>`;

  header.innerHTML = headerHTML;

  let clickTimer = null;
  header.addEventListener("click", function(e){
    if(e.target.closest(".step-edit-actions") || e.target.closest(".cat-assign") || e.target.closest(".color-picker-popup")) return;
    e.stopPropagation();
    if(clickTimer) return;
    clickTimer = setTimeout(function(){
      clickTimer = null;
      if(!hasChildren) return;
      step._open = !step._open;
      renderHierarchy();
    }, 200);
  });

  header.addEventListener("dblclick", function(e){
    if(clickTimer){ clearTimeout(clickTimer); clickTimer = null; }
    if(!appState.editing) return;
    e.stopPropagation();
    const textEl = header.querySelector(".text");
    textEl.contentEditable = "true";
    textEl.focus();
    const range = document.createRange();
    range.selectNodeContents(textEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    textEl.addEventListener("blur", function(){
      textEl.contentEditable = "false";
      step.title = textEl.textContent;
    },{once:true});
    textEl.addEventListener("keydown", function(ev){
      if(ev.key === "Enter" && !ev.shiftKey){ ev.preventDefault(); textEl.blur(); }
    });
  });

  wrapper.appendChild(header);

  if(hasChildren && step._open){
    const detailPanel = document.createElement("div");
    detailPanel.className = "detail-panel open";

    if(step.details){
      const detContent = document.createElement("div");
      const dt = step.detailType || "expand";
      detContent.className = dt === "chriga" ? "detail-chriga" : "detail-expand";
      const textContent = step.details.split("\n").map(line => line).join("<br>");

      if(dt === "chriga"){
        detContent.innerHTML = `<div class="detail-content"><span class="stop-icon">🛑</span> ${textContent.replace(/בפועל:/g,'<span class="reality">בפועל:</span>')}</div>`;
      } else {
        detContent.innerHTML = `<div class="detail-content">${textContent}</div>`;
      }
      detContent.addEventListener("dblclick", function(e){
        if(!appState.editing) return;
        e.stopPropagation();
        const dc = detContent.querySelector(".detail-content");
        dc.contentEditable = "true";
        dc.focus();
        dc.addEventListener("blur", function(){
          dc.contentEditable = "false";
          step.details = dc.innerText;
        },{once:true});
      });
      detailPanel.appendChild(detContent);
    }

    if(step.children){
      step.children.forEach((child, ci) => {
        detailPanel.appendChild(renderStep(child, stage, ci));
      });
      if(appState.editing){
        const addBtn = document.createElement("button");
        addBtn.className = "add-step-btn";
        addBtn.style.margin = "4px 10px";
        addBtn.textContent = "➕ הוסף תת-שלב";
        addBtn.onclick = function(e){ e.stopPropagation(); addStepTo(step.children, stage); };
        detailPanel.appendChild(addBtn);
      }
    }

    wrapper.appendChild(detailPanel);
  }

  return wrapper;
}

function isLightStep(step){
  return step.depth > 0 && !step.chpiqa;
}

function getDepthColor(depth){
  const colors = ["#0A5E6E","#1A7A9A","#2E96B8","#4DB8D9"];
  return colors[Math.min(depth, colors.length-1)];
}

function lighten(hex, amount){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const nr = Math.round(r + (255-r)*amount);
  const ng = Math.round(g + (255-g)*amount);
  const nb = Math.round(b + (255-b)*amount);
  return `rgb(${nr},${ng},${nb})`;
}

function darken(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 160 ? "#333" : hex;
}

function findStepById(id, steps){
  if(!steps){
    for(const stage of appState.stages){
      const found = findStepById(id, stage.steps);
      if(found) return found;
    }
    return null;
  }
  for(const s of steps){
    if(s.id === id) return s;
    if(s.children){
      const found = findStepById(id, s.children);
      if(found) return found;
    }
  }
  return null;
}

function findStepAndParent(id){
  for(const stage of appState.stages){
    const result = _findInArray(id, stage.steps, null);
    if(result) return {...result, stage};
  }
  return null;
}

function _findInArray(id, arr, parent){
  for(let i=0;i<arr.length;i++){
    if(arr[i].id === id) return {step:arr[i], parent:arr, index:i};
    if(arr[i].children){
      const r = _findInArray(id, arr[i].children, arr[i]);
      if(r) return r;
    }
  }
  return null;
}

function addStage(){
  const letters = "אבגדהוזחטיכלמנסעפצקרשת";
  const usedLetters = new Set(appState.stages.map(s=>s.letter));
  let letter = "";
  for(const l of letters) if(!usedLetters.has(l)){letter=l;break;}
  if(!letter) letter = (appState.stages.length+1).toString();

  const id = "stage_"+genId();
  appState.stages.push({
    id, letter, title:"שלב חדש", subtitle:"",
    steps:[]
  });
  appState.openStages.add(id);
  renderAll();
  showToast("➕ שלב חדש נוסף");
}

function editStageName(id){
  const stage = appState.stages.find(s => s.id === id);
  if(!stage) return;
  const newTitle = prompt("שם השלב:", stage.title);
  if(newTitle !== null && newTitle.trim() !== ""){
    stage.title = newTitle.trim();
    renderAll();
  }
}

function deleteStage(id){
  if(!confirm("למחוק את השלב?")) return;
  appState.stages = appState.stages.filter(s=>s.id!==id);
  appState.openStages.delete(id);
  renderAll();
}

function addStepTo(arr, stage){
  const id = "step_"+genId();
  const depth = arr.length > 0 ? (arr[0].depth || 0) : 0;
  arr.push({
    id, title:"שלב חדש", icon:"", catId:"process", chpiqa:false, depth,
    details:"", detailType:"expand", children:[], _open:true
  });
  renderAll();
}

function editStepTitle(id, btnEl){
  const step = findStepById(id);
  if(!step) return;
  const newTitle = prompt("שם השלב:", step.title);
  if(newTitle !== null && newTitle.trim() !== ""){
    step.title = newTitle.trim();
    renderAll();
  }
}

function deleteStep(id){
  if(!confirm("למחוק?")) return;
  const found = findStepAndParent(id);
  if(found) found.parent.splice(found.index, 1);
  renderAll();
}

function toggleChpiqa(id){
  const found = findStepAndParent(id);
  if(found){
    found.step.chpiqa = !found.step.chpiqa;
    if(found.step.chpiqa && !found.step.detailType) found.step.detailType = "chriga";
    renderAll();
  }
}

function showCatAssign(event, stepId){
  event.stopPropagation();
  document.querySelectorAll(".cat-assign").forEach(d=>d.remove());

  const found = findStepAndParent(stepId);
  if(!found) return;
  const step = found.step;

  const dropdown = document.createElement("div");
  dropdown.className = "cat-assign show";
  dropdown.innerHTML = appState.categories.map(cat => `
    <div class="cat-assign-item ${step.catId===cat.id?'active':''}" onclick="event.stopPropagation();assignCat('${stepId}','${cat.id}')">
      <span class="swatch" style="background:${cat.color}"></span>
      ${escH(cat.name)}
    </div>
  `).join("") + `
    <div class="cat-assign-item reset" onclick="event.stopPropagation();resetStepOverride('${stepId}')">
      🔄 אפס עקיפות
    </div>
  `;

  const header = event.target.closest(".sub-step-header");
  header.style.position = "relative";
  header.appendChild(dropdown);

  setTimeout(()=>{
    document.addEventListener("click", function handler(){
      dropdown.remove();
      document.removeEventListener("click",handler);
    });
  },50);
}

function assignCat(stepId, catId){
  const found = findStepAndParent(stepId);
  if(found){
    found.step.catId = catId;
    document.querySelectorAll(".cat-assign").forEach(d=>d.remove());
    renderAll();
  }
}

function resetStepOverride(stepId){
  const found = findStepAndParent(stepId);
  if(found){
    delete found.step.overrideColor;
    delete found.step.overrideBorder;
    document.querySelectorAll(".cat-assign").forEach(d=>d.remove());
    renderAll();
  }
}

function pickStepColor(event, stepId){
  event.stopPropagation();
  document.querySelectorAll(".color-picker-popup").forEach(p=>p.remove());

  const found = findStepAndParent(stepId);
  if(!found) return;
  const step = found.step;
  const cat = getCat(step.catId) || getCat("process");

  const popup = document.createElement("div");
  popup.className = "color-picker-popup show";
  popup.style.position = "absolute";
  popup.style.zIndex = "300";
  popup.innerHTML = `
    <div style="font-size:11px;color:#888;margin-bottom:6px">רקע:</div>
    <input type="color" value="${step.overrideColor||cat.color}" oninput="setStepOverrideColor('${stepId}',this.value)">
    <div style="font-size:11px;color:#888;margin:6px 0 4px">מסגרת:</div>
    <input type="color" value="${step.overrideBorder||getDepthColor(step.depth)}" oninput="setStepOverrideBorder('${stepId}',this.value)">
    <div class="preset-colors">
      ${["#2E86AB","#8B5CF6","#5B7B9A","#1B3A6B","#2D7D46","#C03928","#CC0000","#0A5E6E","#B8860B"].map(c=>
        `<div class="preset-color" style="background:${c}" onclick="event.stopPropagation();setStepOverrideColor('${stepId}','${c}')"></div>`
      ).join("")}
    </div>
  `;

  const header = event.target.closest(".sub-step-header");
  header.style.position = "relative";
  header.appendChild(popup);

  setTimeout(()=>{
    document.addEventListener("click",function handler(e){
      if(!popup.contains(e.target)){
        popup.remove();
        document.removeEventListener("click",handler);
        renderAll();
      }
    });
  },50);
}

function setStepOverrideColor(stepId, color){
  const found = findStepAndParent(stepId);
  if(found) found.step.overrideColor = color;
}
function setStepOverrideBorder(stepId, color){
  const found = findStepAndParent(stepId);
  if(found) found.step.overrideBorder = color;
}

function flowClickStage(stageId){
  if(!stageId) return;
  // Open the stage in hierarchy
  appState.openStages.add(stageId);
  appState.activeFlowStage = stageId;
  // Also open sub-steps of that stage
  const stage = appState.stages.find(s => s.id === stageId);
  if(stage){
    stage.steps.forEach(s => { s._open = true; });
  }
  renderAll();
  // Scroll hierarchy panel to the stage
  setTimeout(()=>{
    const btn = document.getElementById("stage-btn-" + stageId);
    if(btn){
      btn.scrollIntoView({behavior:'smooth', block:'center'});
    }
    highlightFlowStep();
  }, 100);
}

function highlightFlowStep(){
  if(!appState.activeFlowStage) return;
  const stageFlowMap = getStageFlowMap();
  const flowId = stageFlowMap[appState.activeFlowStage];
  if(!flowId) return;
  const el = document.getElementById(flowId);
  if(!el){return;}
  // Scroll flow card to center the element
  const flowCard = document.querySelector('.flow-card');
  if(flowCard && el){
    const elRect = el.getBoundingClientRect();
    const cardRect = flowCard.getBoundingClientRect();
    const scrollTarget = el.offsetTop - flowCard.offsetTop - (cardRect.height / 2) + (elRect.height / 2);
    flowCard.scrollTo({top: scrollTarget, behavior:'smooth'});
  }
}

function getFlowStepColor(step){

function getFlowStepTextColor(step){

function renderFlowStepElement(step, isInBranch){

  html += `<button class="flow-edit-btn" onclick="event.stopPropagation();flowEditColor('${step.id}',this)" title="צבע">🎨</button>`;

  </select>`;
  html += `<button class="flow-edit-btn" onclick="event.stopPropagation();flowAssignCategory('${step.id}',this)" title="קטגוריה">🏷️</button>`;
  html += `<button class="flow-edit-btn" onclick="event.stopPropagation();flowDeleteStep('${step.id}')" title="מחק" style="color:#c00">🗑️</button>`;
  html += `</div>`;

  const label = escH(step.label);

  if(step.type === "diamond"){
    const diamondLabel = label.replace(/\n/g,"<br>");
    html += `<div class="flow-diamond${actCls}" style="background:${color};color:${textColor}${borderStyle}" ${stageClick}><span>${diamondLabel}</span></div>`;
    // Reject/approve labels for diamonds
    if(step.rejectLabel || step.approveLabel){
      const isRedReject = step.rejectLabel && step.rejectLabel.includes("6 חודשים");
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:4px 20px">`;
      if(isRedReject){
        html += `<div style="font-size:10px;color:#CC0000;background:#fff0f0;padding:3px 8px;border-radius:5px;border:1px solid #CC0000">${escH(step.rejectLabel)}</div>`;
      } else {
        html += `<div style="font-size:10px;color:#999;background:#f0f0f0;padding:3px 8px;border-radius:5px;border:1px solid #ccc">${escH(step.rejectLabel||"")}</div>`;
      }
      html += `<div style="color:#bbb;font-size:11px">▼ ${escH(step.approveLabel||"")}</div>`;
      html += `</div>`;
    }
  } else if(step.type === "circle"){
    const circleLabel = label.replace(/\n/g,"<br>");
    html += `<div class="flow-circle${actCls}" style="background:${color};color:${textColor};width:70px;height:70px" ${stageClick}><span style="font-size:10px;line-height:1.2;text-align:center">${circleLabel}</span></div>`;
  } else if(step.type === "pill"){
    html += `<div style="${smallStyle}font-size:${isInBranch?'10':'11'}px;padding:${isInBranch?'5px 8px':'6px 14px'};background:${color};color:${textColor};border-radius:14px;font-weight:600;display:inline-block;cursor:pointer" ${stageClick}>${label}</div>`;
  } else if(step.type === "note"){
    const noteText = escH(step.note||step.label).replace(/\n/g,"<br>");
    if(step.noteType === "warning-circle"){
      // Red circle annotation (like the ממשלה explanation)
      html += `<div style="background:#CC0000;color:white;border-radius:50%;width:110px;height:110px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:8px;line-height:1.3;padding:10px;margin:4px auto">${noteText}</div>`;
    } else if(step.noteType === "warning-box"){
      // Dark blue small annotation box
      html += `<div style="background:#1B2A4A;color:white;border-radius:6px;font-size:9px;padding:5px 8px;text-align:center;line-height:1.3;margin:4px auto;max-width:120px">${noteText}</div>`;
    } else if(step.noteType === "warning"){
      html += `<div style="background:#CC0000;color:white;border-radius:8px;font-size:9px;padding:5px 10px;text-align:center;line-height:1.3;margin:4px auto;max-width:160px">${noteText}</div>`;
    } else {
      html += `<div class="flow-note" style="color:#666;font-size:10px;padding:2px 8px">${noteText}</div>`;
    }
  } else {
    // box (default)
    const catId = step.category;
    const borderExtra = catId === "chriga" ? ";border-color:#CC0000" : "";
    html += `<div class="box${actCls}" style="background:${color};color:${textColor}${borderExtra}${borderStyle};${smallStyle}" ${stageClick}>${label}</div>`;
  }

  return html;
}

function renderFlowStepWithWrapper(step, index, arr, isInBranch){
  let html = "";
  const active = appState.activeFlowStage;
  const isAct = step.stageId && active === step.stageId;

  if(step.type === "split"){
    // Insert button before split
    html += `<button class="flow-insert-btn" onclick="flowInsertStep(${index},'main')">➕</button>`;
    html += renderFlowSplit(step, index);
  } else {
    // Insert button before step (in main flow only, not in branches)
    if(!isInBranch){
      html += `<button class="flow-insert-btn" onclick="flowInsertStep(${index},'main')">➕</button>`;
    }

    html += `<div class="flow-step" id="${step.id}" style="position:relative">`;
    html += renderFlowStepElement(step, isInBranch);
    if(isAct && !isInBranch) html += `<span class="flow-here-badge">← אתה כאן</span>`;
    html += `</div>`;

    // Note below step
    if(step.note){
      if(step.noteType === "warning"){
        html += `<div class="flow-side-note">${escH(step.note).replace(/\n/g,"<br>")}</div>`;
      } else {
        html += `<div style="font-size:9px;color:#666;text-align:center;margin:1px 0">${escH(step.note).replace(/\n/g,"<br>")}</div>`;
      }
    }
  }

  // Arrow after step (if not last and not in branch)
  if(!isInBranch && index < arr.length - 1 && step.type !== "split" && step.type !== "note"){
    html += `<div class="flow-arrow">▼</div>`;
  }

  return html;
}

function renderFlowSplit(step, mainIndex){
  let html = `<div class="flow-branch-container">`;
  const branches = step.branches || [];

  branches.forEach((branch, bi) => {
    const borderSide = bi === 0 ? "border-left" : "border-right";
    const paddingSide = bi === 0 ? "padding-left" : "padding-right";
    html += `<div class="flow-branch" style="flex:1;${borderSide}:2px solid #ddd;${paddingSide}:10px">`;
    if(branch.label) html += `<div class="flow-branch-label">${escH(branch.label)}</div>`;

    branch.steps.forEach((bStep, bsi) => {
      html += `<div class="flow-step" id="${bStep.id}" style="position:relative">`;
      html += renderFlowStepElement(bStep, true);
      html += `</div>`;
      // Note below branch step
      if(bStep.note){
        if(bStep.noteType === "warning"){
          html += `<div class="flow-side-note" style="font-size:9px;max-width:140px">${escH(bStep.note).replace(/\n/g,"<br>")}</div>`;
        } else {
          html += `<div style="font-size:9px;color:#666;text-align:center;margin:1px 0">${escH(bStep.note)}</div>`;
        }
      }
      // "או" separator between branch items
      if(bsi < branch.steps.length - 1){
        html += `<div class="flow-or" style="width:18px;height:18px;font-size:8px">או</div>`;
      }
    });

    // Add step button inside branch
    html += `<button class="flow-insert-btn" onclick="flowInsertBranchStep('${step.id}',${bi})" style="margin-top:4px">➕</button>`;
    html += `</div>`;

    // "או" separator between branches
    if(bi < branches.length - 1){
      html += `<div style="display:flex;align-items:center;padding:0 6px"><div class="flow-or">או</div></div>`;
    }
  });

  html += `</div>`;
  // Edit controls for split
  html += `<div class="flow-branch-edit">`;
  html += `<button class="flow-edit-btn" onclick="flowAddBranch('${step.id}')" title="הוסף ענף">➕ ענף</button>`;
  html += `<button class="flow-edit-btn" onclick="flowDeleteStep('${step.id}')" title="מחק פיצול" style="color:#c00">🗑️ פיצול</button>`;
  if(branches.length > 1) html += `<button class="flow-edit-btn" onclick="flowRemoveLastBranch('${step.id}')" title="הסר ענף אחרון">➖ ענף</button>`;
  html += `</div>`;

  // Arrow after split
  html += `<div class="flow-arrow">▼</div>`;

  return html;
}

function renderFlowChart(){
  const panel = document.getElementById("flowPanel");
  let html = `<div class="flow-card"><h3>תרשים זרימה — הליך חקיקה פרטית</h3>`;

  // Shape legend
  html += `<div class="flow-legend">
    <div class="flow-legend-item"><span class="flow-legend-shape" style="border:2px solid #555;border-radius:4px;width:20px;height:13px"></span> תהליך רגיל</div>
    <div class="flow-legend-item"><span class="flow-legend-shape" style="font-size:16px">◇</span> נקודת החלטה</div>
    <div class="flow-legend-item"><span class="flow-legend-shape" style="width:16px;height:16px;border-radius:50%;background:#555"></span> בעל סמכות ייחודי</div>
    <div class="flow-legend-item"><span class="flow-legend-shape" style="border:2px solid #CC0000;border-radius:4px;width:20px;height:13px"></span> חריגה מתקנון</div>
    <div class="flow-legend-item"><span class="flow-legend-shape" style="border:2px solid #B8860B;border-radius:4px;width:20px;height:13px;background:#FFF8DC"></span> המתנה/עיכוב</div>
  </div>`;

  // Render all flow steps from data
  const steps = appState.flowSteps;
  steps.forEach((step, i) => {
    html += renderFlowStepWithWrapper(step, i, steps, false);
  });

  // Final insert button
  html += `<button class="flow-insert-btn" onclick="flowInsertStep(${steps.length},'main')">➕ הוסף שלב</button>`;

  html += `</div>`;
  panel.innerHTML = html;
}

// ============================================================
// FLOW CHART — Editing Functions
// ============================================================

function findFlowStep(id, steps){
  if(!steps) steps = appState.flowSteps;
  for(const s of steps){
    if(s.id === id) return s;
    if(s.branches){
      for(const b of s.branches){
        const found = findFlowStep(id, b.steps);
        if(found) return found;
      }
    }
  }
  return null;
}

function findFlowStepAndParent(id){
  // Search main array
  for(let i=0;i<appState.flowSteps.length;i++){
    if(appState.flowSteps[i].id === id) return {step:appState.flowSteps[i], arr:appState.flowSteps, index:i};
    if(appState.flowSteps[i].branches){
      for(const b of appState.flowSteps[i].branches){
        for(let j=0;j<b.steps.length;j++){
          if(b.steps[j].id === id) return {step:b.steps[j], arr:b.steps, index:j};
        }
      }
    }
  }
  return null;
}

function flowEditLabel(id){
  const step = findFlowStep(id);
  if(!step) return;
  const newLabel = prompt("שם השלב:", step.label);
  if(newLabel !== null && newLabel.trim() !== ""){
    step.label = newLabel.trim();
    renderAll();
  }
}

function flowEditColor(id, btnEl){
  document.querySelectorAll(".color-picker-popup").forEach(p=>p.remove());
  const step = findFlowStep(id);
  if(!step) return;
  const currentColor = getFlowStepColor(step);

  const popup = document.createElement("div");
  popup.className = "color-picker-popup show";
  popup.style.position = "fixed";
  popup.style.zIndex = "300";
  const rect = btnEl.getBoundingClientRect();
  popup.style.top = (rect.bottom + 4) + "px";
  popup.style.left = (rect.left) + "px";

  popup.innerHTML = `
    <div style="font-size:11px;color:#888;margin-bottom:6px">צבע רקע:</div>
    <input type="color" value="${currentColor}" oninput="flowSetColor('${id}',this.value)">
    <div class="preset-colors">
      ${["#2E86AB","#8B5CF6","#5B7B9A","#1B3A6B","#2D7D46","#C03928","#CC0000","#0A5E6E","#B8860B","#E67E22","#8E44AD","#2C3E50","#f0f0f0"].map(c=>
        `<div class="preset-color" style="background:${c}" onclick="event.stopPropagation();flowSetColor('${id}','${c}');this.closest('.color-picker-popup').querySelector('input').value='${c}'"></div>`
      ).join("")}
    </div>
  `;

  document.body.appendChild(popup);
  setTimeout(()=>{
    document.addEventListener("click",function handler(e){
      if(!popup.contains(e.target) && e.target !== btnEl){
        popup.remove();
        document.removeEventListener("click",handler);
        renderAll();
      }
    });
  },50);
}

function flowSetColor(id, color){
  const step = findFlowStep(id);
  if(step) step.color = color;
}

function flowChangeShape(id, shape){
  const step = findFlowStep(id);
  if(step){
    step.type = shape;
    renderAll();
  }
}

function flowAssignCategory(id, btnEl){
  document.querySelectorAll(".cat-assign").forEach(d=>d.remove());
  const step = findFlowStep(id);
  if(!step) return;

  const dropdown = document.createElement("div");
  dropdown.className = "cat-assign show";
  dropdown.style.position = "fixed";
  dropdown.style.zIndex = "300";
  const rect = btnEl.getBoundingClientRect();
  dropdown.style.top = (rect.bottom + 4) + "px";
  dropdown.style.left = (rect.left) + "px";

  dropdown.innerHTML = appState.categories.map(cat => `
    <div class="cat-assign-item ${step.category===cat.id?'active':''}" onclick="event.stopPropagation();flowSetCategory('${id}','${cat.id}')">
      <span class="swatch" style="background:${cat.color}"></span>
      ${escH(cat.name)}
    </div>
  `).join("") + `
    <div class="cat-assign-item reset" onclick="event.stopPropagation();flowClearCategoryOverride('${id}')">
      🔄 נקה צבע ידני
    </div>
  `;

  document.body.appendChild(dropdown);
  setTimeout(()=>{
    document.addEventListener("click",function handler(e){
      if(!dropdown.contains(e.target)){
        dropdown.remove();
        document.removeEventListener("click",handler);
      }
    });
  },50);
}

function flowSetCategory(id, catId){
  const step = findFlowStep(id);
  if(step){
    step.category = catId;
    delete step.color; // Remove manual override when assigning category
    document.querySelectorAll(".cat-assign").forEach(d=>d.remove());
    renderAll();
  }
}

function flowClearCategoryOverride(id){
  const step = findFlowStep(id);
  if(step){
    delete step.color;
    delete step.textColor;
    document.querySelectorAll(".cat-assign").forEach(d=>d.remove());
    renderAll();
  }
}

function flowDeleteStep(id){
  if(!confirm("למחוק שלב מתרשים הזרימה?")) return;
  const found = findFlowStepAndParent(id);
  if(found){
    found.arr.splice(found.index, 1);
    renderAll();
  }
}

function flowInsertStep(index, context){
  const newStep = {
    id: "flow_" + genId(),
    label: "שלב חדש",
    type: "box",
    category: "process",
    stageId: "",
    note: "",
    noteType: ""
  };
  appState.flowSteps.splice(index, 0, newStep);
  renderAll();
  showToast("➕ שלב חדש נוסף לתרשים");
}

function flowInsertBranchStep(splitId, branchIndex){
  const split = findFlowStep(splitId);
  if(!split || !split.branches || !split.branches[branchIndex]) return;
  const newStep = {
    id: "flow_" + genId(),
    label: "שלב חדש",
    type: "box",
    category: "process",
    stageId: "",
    note: "",
    noteType: ""
  };
  split.branches[branchIndex].steps.push(newStep);
  renderAll();
  showToast("➕ שלב חדש נוסף לענף");
}

function flowAddBranch(splitId){
  const split = findFlowStep(splitId);
  if(!split) return;
  if(!split.branches) split.branches = [];
  split.branches.push({
    label: "ענף חדש",
    steps: [{
      id: "flow_" + genId(),
      label: "שלב חדש",
      type: "box",
      category: "process",
      stageId: "",
      note: "",
      noteType: ""
    }]
  });
  renderAll();
  showToast("➕ ענף חדש נוסף");
}

function flowRemoveLastBranch(splitId){
  const split = findFlowStep(splitId);
  if(!split || !split.branches || split.branches.length <= 1) return;
  if(!confirm("למחוק את הענף האחרון?")) return;
  split.branches.pop();
  renderAll();
}

function flowAddSplitAtEnd(){
  const newSplit = {
    id: "flow_" + genId(),
    label: "",
    type: "split",
    stageId: "",
    note: "",
    noteType: "",
    branches: [
      { label: "מסלול א'", steps: [{ id: "flow_" + genId(), label: "אפשרות 1", type: "box", category: "process", stageId: "", note: "", noteType: "" }] },
      { label: "מסלול ב'", steps: [{ id: "flow_" + genId(), label: "אפשרות 2", type: "box", category: "process", stageId: "", note: "", noteType: "" }] }
    ]
  };
  appState.flowSteps.push(newSplit);
  renderAll();
  showToast("🔀 פיצול חדש נוסף לתרשים");
}

// ============================================================
// UTILITIES
// ============================================================

function escH(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timeout);
  t._timeout = setTimeout(()=>t.classList.remove("show"), 2500);
}

// ============================================================
// RENDER ALL
// ============================================================

function renderAll(){
  renderLegend();
  renderHierarchy();
  renderFlowChart();
}

// ============================================================
// INIT
// ============================================================

loadFromStorage();
if(!localStorage.getItem("knesset-legislation-v2")){
  appState.stages[0].steps.forEach(s => { s._open = true; if(s.children) s.children.forEach(c => c._open = false); });
}
// Set initial active flow stage from open stages
for(const s of appState.stages){
  if(appState.openStages.has(s.id)){
    appState.activeFlowStage = s.id;
    break;
  }
}
renderAll();
// Initial highlight
setTimeout(highlightFlowStep, 300);

</script>
